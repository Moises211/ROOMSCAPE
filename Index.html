<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOMSCAPE SPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="CSS/Style.css" rel="stylesheet">
</head>
<body class="nivel2-body">
    <div class="container-fluid py-3">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 text-white">
            <div>
                <h1 class="h5 mb-1">ROOMSCAPE SPA</h1>
                <p class="mb-0 text-white-50">Activa el modo tutor para mostrar el menú de navegación directa.</p>
            </div>
            <div class="form-check form-switch text-white">
                <input class="form-check-input" type="checkbox" id="tutorSwitch">
                <label class="form-check-label" for="tutorSwitch">Tutor</label>
            </div>
        </div>

        <div id="tutorMenu" class="d-none mt-3">
            <div class="card bg-dark bg-opacity-75 border-secondary">
                <div class="card-body p-3">
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-outline-light btn-sm" data-tutor-route="nivel1">Nivel 1</button>
                        <button type="button" class="btn btn-outline-light btn-sm" data-tutor-route="nivel2">Nivel 2</button>
                        <button type="button" class="btn btn-outline-light btn-sm" data-tutor-route="nivel3">Nivel 3</button>
                        <button type="button" class="btn btn-outline-light btn-sm" data-tutor-route="nivel4">Nivel 4</button>
                        <button type="button" class="btn btn-outline-light btn-sm" data-tutor-route="nivel5">Nivel 5</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main id="app" class="container py-4 py-lg-5">
        <div class="text-center text-white py-5">
            <h1 class="display-6 fw-bold">ROOMSCAPE</h1>
            <p class="lead">Cargando el primer nivel...</p>
        </div>
    </main>

    <script src="JS/script.js"></script>
</body>
</html>
