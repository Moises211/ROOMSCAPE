<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 1: El guardián de la ubicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/Style.css" rel="stylesheet">
</head>

<body class="nivel2-body">
    <main class="container py-4 py-lg-5">
        <header class="mb-4">
            <p class="nivel2-kicker mb-2">ROOMSCAPE · NIVEL 1</p>
            <h1 class="display-5 fw-bold mb-3">El Guardián de la Ubicación</h1>
            <p class="lead mb-0">Obtén tu ubicación para desbloquear el siguiente nivel.</p>
        </header>

        <section class="nivel2-panel">
            <div class="mb-3">
                <button id="btnUbicacion" class="btn btn-warning">Obtener ubicación</button>
            </div>

            <hr class="border-secondary">

            <dl class="row mb-3">
                <dt class="col-4">Latitud</dt>
                <dd id="latitud" class="col-8 text-end font-monospace">---</dd>
                <dt class="col-4">Longitud</dt>
                <dd id="longitud" class="col-8 text-end font-monospace">---</dd>
            </dl>

            <div id="mensaje" class="alert alert-info">
                Esperando ubicación...
            </div>

            <button id="btnSiguiente" class="btn btn-success mt-3" disabled>Ir al Nivel 2</button>
        </section>
    </main>

    <script src="../JS/app-nivel1.js"></script>

</body>

</html>
