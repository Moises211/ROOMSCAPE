<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 4: Núcleo de Procesamiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/Style.css" rel="stylesheet">
</head>
<body class="nivel3-body">
    <main class="container py-4 py-lg-5">
        <header class="nivel3-header mb-4">
            <div>
                <p class="nivel3-kicker mb-2">ROOMSCAPE · NIVEL 4</p>
                <h1 class="display-5 fw-bold mb-3">Núcleo de Procesamiento</h1>
                <p class="lead mb-0">Activa el simulador de sensores y procesa datos sin congelar la interfaz.</p>
            </div>
            <div class="nivel3-badge">04 / 05</div>
        </header>

        <section class="nivel3-panel">
            <div class="alert alert-info py-2 d-flex justify-content-between align-items-center">
                <span><strong>Prueba de interactividad:</strong> Mientras procesa, puedes escribir o pulsar el botón testigo de aquí al lado sin congelamientos.</span>
                <button class="btn btn-sm btn-outline-info" onclick="console.log('UI Funcional e Interactiva')">Probar Click UI</button>
            </div>

            <div class="d-flex flex-column gap-3 mb-4">
                <button class="btn btn-warning" id="btnNivel4">Simular y Enviar 20,000 Datos</button>
                <button class="btn btn-success" id="btnContinuar" disabled>Continuar a Nivel 5</button>
            </div>

            <div class="progress mb-4" style="height: 25px;">
                <div id="barraN4" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%;">0%</div>
            </div>

            <div id="resultadosN4" class="card shadow-sm d-none"></div>
        </section>
    </main>

    <script src="../JS/utils/simulador.js"></script>
    <script src="../JS/app-nivel4.js"></script>
