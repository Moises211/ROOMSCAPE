<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 4: Núcleo de Procesamiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 class="mb-4">Simulador de Sensores - Nivel 4</h2>
        
        <div class="alert alert-info py-2 d-flex justify-content-between align-items-center">

        </div>

        <button class="btn btn-primary mb-4" id="btnNivel4">Simular y Enviar 20,000 Datos</button>

        <div class="progress mb-4" style="height: 25px;">
            <div id="barraN4" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%;">0%</div>
        </div>

        <div id="resultadosN4" class="card shadow-sm d-none"></div>
    </div>

    <script src="../JS/utils/simulador.js"></script>
    <script src="../JS/app-nivel4.js"></script>
