<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 5: El Portal Cuántico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container my-5">
        <h2 class="mb-4 text-white">Procesamiento Masivo - Nivel 5</h2>
        
        <div class="alert alert-secondary py-2 text-dark d-flex justify-content-between align-items-center">
            <span><strong>Verificación de actividad en paralero:</strong> Escribe aquí o interactúa.</span>
            <input type="text" class="form-control form-control-sm w-25" placeholder="Escribe aquí para probar...">
        </div>

        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-light" id="btnNivel5">Generar y Filtrar Registros</button>
            <button class="btn btn-success d-none" id="btnExportar">Descargar JSON Estadístico</button>
        </div>

        <div class="progress mb-4" style="height: 25px;">
            <div id="barraN5" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;">0%</div>
        </div>

        <div id="resultadosN5" class="card text-dark shadow-sm d-none"></div>
    </div>

    <script src="../JS/utils/simulador.js"></script>
    <script src="../JS/app-nivel5.js"></script>
</body>
</html>
