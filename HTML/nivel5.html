<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 5: El Portal Cuántico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../CSS/Style.css" rel="stylesheet">
</head>
<body class="nivel3-body">
    <main class="container py-4 py-lg-5">
        <header class="nivel3-header mb-4">
            <div>
                <p class="nivel3-kicker mb-2">ROOMSCAPE · NIVEL 5</p>
                <h1 class="display-5 fw-bold mb-3">El Portal Cuántico</h1>
                <p class="lead mb-0">Genera y filtra registros con estilo mientras pruebas la capacidad de procesamiento masivo.</p>
            </div>
            <div class="nivel3-badge">05 / 05</div>
        </header>

        <section class="nivel3-panel">
            <div class="alert alert-secondary py-2 text-dark d-flex justify-content-between align-items-center">
                <span><strong>Verificación de actividad en paralelo:</strong> Escribe aquí o interactúa.</span>
                <input type="text" class="form-control form-control-sm w-25" placeholder="Escribe aquí para probar...">
            </div>

            <div class="d-flex gap-2 mb-4">
                <button class="btn btn-warning" id="btnNivel5">Generar y Filtrar Registros</button>
                <button class="btn btn-success d-none" id="btnExportar">Descargar JSON Estadístico</button>
            </div>

            <div class="progress mb-4" style="height: 25px;">
                <div id="barraN5" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;">0%</div>
            </div>

            <div id="resultadosN5" class="card text-dark shadow-sm d-none"></div>
        </section>
    </main>

    <script src="../JS/utils/simulador.js"></script>
    <script src="../JS/app-nivel5.js"></script>
</body>
</html>
